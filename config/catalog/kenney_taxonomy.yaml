# Kenney model taxonomy: role (placement semantics) and allowed room types.
# Build script merges with OBJ scan into kenney_catalog.json.

exclude_prefixes:
  - wall
  - floor
  - doorway
  - stairs
  - paneling
  - ceilingFan
  - hood
  - shower
  - toilet
  - bathtub
  - washer
  - dryer

# placement role -> IP category (coarse solver category)
role_to_category:
  bed: bed
  chair: chair
  desk: desk
  sofa: sofa
  wardrobe: wardrobe
  tv_stand: tv_stand
  coffee_table: coffee_table
  dining_table: dining_table
  side_table: side_table
  nightstand: nightstand
  dresser: dresser
  counter_base: counter
  counter_bar: counter
  counter_end: counter
  stove: counter
  sink: counter
  fridge: fridge
  bookshelf: wardrobe
  bar_stool: chair
  rug: decor
  lamp: decor
  plant: decor
  decor: decor

overrides:
  bedDouble: {role: bed, rooms: [bedroom]}
  bedSingle: {role: bed, rooms: [bedroom]}
  bedBunk: {role: bed, rooms: [bedroom]}
  chair: {role: chair, rooms: [bedroom, living_room, kitchen]}
